version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: bot:latest
    container_name: ${COMPOSE_PROJECT_NAME:-tgbot}-bot
    restart: always
    env_file:
      - .env.timeweb
    ports:
      - "8080:8080"  # Timeweb Cloud использует порт 8080 для первого сервиса
    environment:
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=8080
      - USE_WEBHOOK=true
    networks:
      - app
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: .
      dockerfile: ./admin/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-tgbot}-admin
    restart: always
    env_file:
      - .env.timeweb
    ports:
      - "8081:5000"  # Админка на отдельном порту
    environment:
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=5000
    networks:
      - app
    depends_on:
      - bot
      - postgres

  postgres:
    image: postgres:14-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-tgbot}-postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      - app
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-tgbot}-redis
    restart: always
    environment:
      - REDIS_PASS=${REDIS_PASS}
    networks:
      - app
    volumes:
      - redis-data:/data
    command: /bin/sh -c 'if [ -n "$REDIS_PASS" ]; then redis-server --requirepass "$REDIS_PASS"; else redis-server; fi'

  migrator:
    image: bot:latest
    container_name: ${COMPOSE_PROJECT_NAME:-tgbot}-migrator
    restart: "on-failure"
    command: alembic upgrade head
    env_file:
      - .env.timeweb
    networks:
      - app
    depends_on:
      - postgres
    volumes:
      - ./migrations:/usr/src/app/migrations

networks:
  app:
    driver: bridge

volumes:
  postgres-data: {}
  redis-data: {}
